<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Patient Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --accent: #4f8ef7;
      --accent2: #7c3aed;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --card: rgba(15,23,42,0.8);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(79,142,247,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 0%, rgba(124,58,237,0.12) 0%, transparent 50%);
    }

    /* ── Header ── */
    header {
      background: rgba(10,15,30,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo-icon { font-size: 1.5rem; -webkit-text-fill-color: initial; }
    .header-badge {
      background: linear-gradient(135deg, rgba(79,142,247,0.2), rgba(124,58,237,0.2));
      border: 1px solid rgba(79,142,247,0.3);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Layout ── */
    main { max-width: 1300px; margin: 0 auto; padding: 2rem; }

    /* ── Stats Row ── */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      backdrop-filter: blur(10px);
      transition: transform 0.2s, border-color 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); border-color: rgba(79,142,247,0.3); }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 700; }
    .stat-value.blue { color: var(--accent); }
    .stat-value.green { color: var(--success); }
    .stat-value.purple { color: #a78bfa; }
    .stat-value.yellow { color: var(--warning); }

    /* ── Grid Layout ── */
    .grid { display: grid; grid-template-columns: 380px 1fr; gap: 1.5rem; align-items: start; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.75rem;
      backdrop-filter: blur(10px);
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }
    .card-title span { font-size: 1.1rem; }

    /* ── Form ── */
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
    input, select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.875rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
    }
    select option { background: #1e293b; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      margin-top: 0.5rem;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 25px rgba(79,142,247,0.3); }
    .btn-primary:active { transform: translateY(0); }

    /* ── Search ── */
    .search-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .search-bar input {
      flex: 1;
      min-width: 180px;
    }
    .btn-search {
      padding: 10px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-search:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-reset {
      padding: 10px 16px;
      background: var(--surface-hover);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.875rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-reset:hover { background: rgba(255,255,255,0.12); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      text-align: left;
      padding: 10px 14px;
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 13px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: var(--surface-hover); }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-admitted { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
    .badge-discharged { background: rgba(100,116,139,0.15); color: var(--muted); border: 1px solid rgba(100,116,139,0.2); }
    .badge-inpatient { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.2); }
    .badge-outpatient { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.2); }

    /* ── Action Buttons ── */
    .action-btn {
      padding: 5px 11px;
      border: none;
      border-radius: 7px;
      font-size: 0.72rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      margin-right: 4px;
    }
    .btn-discharge {
      background: rgba(245,158,11,0.15);
      color: var(--warning);
      border: 1px solid rgba(245,158,11,0.25);
    }
    .btn-discharge:hover { background: rgba(245,158,11,0.25); }
    .btn-delete {
      background: rgba(239,68,68,0.12);
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.2);
    }
    .btn-delete:hover { background: rgba(239,68,68,0.25); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1e293b;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 0.875rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      max-width: 340px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-left: 4px solid var(--success); }
    #toast.error { border-left: 4px solid var(--danger); }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 2rem; color: var(--muted); }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr 1fr; }
      main { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">🏥</span>
    Hospital Patient Management
  </div>
  <div class="header-badge" id="connStatus">⚡ Connecting...</div>
</header>

<main>
  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Patients</div>
      <div class="stat-value blue" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Admitted</div>
      <div class="stat-value green" id="statAdmitted">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Discharged</div>
      <div class="stat-value purple" id="statDischarged">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Inpatients</div>
      <div class="stat-value yellow" id="statInpatient">—</div>
    </div>
  </div>

  <div class="grid">
    <!-- Register Form -->
    <div class="card">
      <div class="card-title"><span>➕</span> Register New Patient</div>
      <form id="registerForm">
        <div class="form-group">
          <label>Full Name *</label>
          <input id="fullName" type="text" placeholder="e.g. John Doe" required />
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input id="email" type="email" placeholder="john@example.com" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone *</label>
            <input id="phoneNumber" type="text" placeholder="9876543210" required />
          </div>
          <div class="form-group">
            <label>Age *</label>
            <input id="age" type="number" placeholder="30" min="0" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Gender</label>
            <select id="gender">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Patient Type</label>
            <select id="patientType">
              <option value="Inpatient">Inpatient</option>
              <option value="Outpatient">Outpatient</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Disease / Diagnosis *</label>
          <input id="disease" type="text" placeholder="e.g. Typhoid Fever" required />
        </div>
        <div class="form-group">
          <label>Doctor Assigned *</label>
          <input id="doctorAssigned" type="text" placeholder="e.g. Dr. Sharma" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Room Number</label>
            <input id="roomNumber" type="text" placeholder="e.g. 101A" />
          </div>
          <div class="form-group">
            <label>Admission Date</label>
            <input id="admissionDate" type="date" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary">🚀 Register Patient</button>
      </form>
    </div>

    <!-- Patients Table -->
    <div class="card">
      <div class="card-title"><span>👥</span> Patient Records</div>
      <div class="search-bar">
        <input id="searchName" type="text" placeholder="Search by name..." />
        <input id="searchDisease" type="text" placeholder="Search by disease..." />
        <button class="btn-search" onclick="searchPatients()">🔍 Search</button>
        <button class="btn-reset" onclick="loadPatients()">↺ Reset</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Disease</th>
              <th>Doctor</th>
              <th>Type</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="patientTableBody">
            <tr><td colspan="6" class="loading">Loading patients...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Toast -->
<div id="toast"></div>

<script>
  const API = 'http://localhost:3000';

  // ── Toast ──────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
    t.className = 'show ' + type;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = '', 3000);
  }

  // ── Load all patients ──────────────────────────────────
  async function loadPatients() {
    document.getElementById('searchName').value = '';
    document.getElementById('searchDisease').value = '';
    try {
      const res = await fetch(`${API}/patients`);
      const data = await res.json();
      renderTable(data.data || []);
      updateStats(data.data || []);
      document.getElementById('connStatus').textContent = '🟢 Connected';
      document.getElementById('connStatus').style.color = '#10b981';
    } catch {
      document.getElementById('connStatus').textContent = '🔴 Offline';
      document.getElementById('patientTableBody').innerHTML =
        `<tr><td colspan="6" class="empty"><div class="empty-icon">⚠️</div>Could not reach API. Is the server running?</td></tr>`;
    }
  }

  // ── Update Stats ──────────────────────────────────────
  function updateStats(patients) {
    document.getElementById('statTotal').textContent = patients.length;
    document.getElementById('statAdmitted').textContent = patients.filter(p => p.status === 'Admitted').length;
    document.getElementById('statDischarged').textContent = patients.filter(p => p.status === 'Discharged').length;
    document.getElementById('statInpatient').textContent = patients.filter(p => p.patientType === 'Inpatient').length;
  }

  // ── Render table rows ──────────────────────────────────
  function renderTable(patients) {
    const tbody = document.getElementById('patientTableBody');
    if (!patients.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty"><div class="empty-icon">🏥</div>No patient records found.</td></tr>`;
      return;
    }
    tbody.innerHTML = patients.map(p => `
      <tr>
        <td>
          <div style="font-weight:600">${p.fullName}</div>
          <div style="font-size:0.72rem;color:var(--muted)">${p.email}</div>
        </td>
        <td>${p.disease}</td>
        <td>${p.doctorAssigned}</td>
        <td><span class="badge badge-${p.patientType?.toLowerCase()}">${p.patientType || '—'}</span></td>
        <td><span class="badge badge-${p.status?.toLowerCase()}">${p.status}</span></td>
        <td>
          ${p.status === 'Admitted'
            ? `<button class="action-btn btn-discharge" onclick="dischargePatient('${p._id}')">Discharge</button>`
            : ''}
          <button class="action-btn btn-delete" onclick="deletePatient('${p._id}')">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  // ── Search ────────────────────────────────────────────
  async function searchPatients() {
    const name = document.getElementById('searchName').value.trim();
    const disease = document.getElementById('searchDisease').value.trim();
    if (!name && !disease) { loadPatients(); return; }
    try {
      const params = new URLSearchParams();
      if (name) params.set('name', name);
      if (disease) params.set('disease', disease);
      const res = await fetch(`${API}/patients/search?${params}`);
      const data = await res.json();
      renderTable(data.data || []);
    } catch {
      showToast('Search failed', 'error');
    }
  }

  // ── Register ──────────────────────────────────────────
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = {
      fullName: document.getElementById('fullName').value,
      email: document.getElementById('email').value,
      phoneNumber: document.getElementById('phoneNumber').value,
      age: Number(document.getElementById('age').value),
      gender: document.getElementById('gender').value,
      patientType: document.getElementById('patientType').value,
      disease: document.getElementById('disease').value,
      doctorAssigned: document.getElementById('doctorAssigned').value,
      roomNumber: document.getElementById('roomNumber').value,
      admissionDate: document.getElementById('admissionDate').value || undefined,
    };
    try {
      const res = await fetch(`${API}/patients`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');
      showToast(`${body.fullName} registered successfully!`);
      document.getElementById('registerForm').reset();
      loadPatients();
    } catch (err) {
      showToast(err.message, 'error');
    }
  });

  // ── Discharge ─────────────────────────────────────────
  async function dischargePatient(id) {
    try {
      await fetch(`${API}/patients/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'Discharged' }),
      });
      showToast('Patient discharged');
      loadPatients();
    } catch {
      showToast('Failed to update', 'error');
    }
  }

  // ── Delete ────────────────────────────────────────────
  async function deletePatient(id) {
    if (!confirm('Delete this patient record?')) return;
    try {
      const res = await fetch(`${API}/patients/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      showToast('Patient deleted');
      loadPatients();
    } catch {
      showToast('Failed to delete', 'error');
    }
  }

  // ── Search on Enter ───────────────────────────────────
  ['searchName','searchDisease'].forEach(id =>
    document.getElementById(id).addEventListener('keyup', e => { if (e.key === 'Enter') searchPatients(); })
  );

  // ── Init ──────────────────────────────────────────────
  loadPatients();
</script>
</body>
</html>
